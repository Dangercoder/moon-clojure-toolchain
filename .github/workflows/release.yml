name: Release

permissions:
  # Releases
  contents: write
  # ghcr.io OCI artifacts
  packages: write
  attestations: write
  id-token: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - id: build
        uses: moonrepo/build-wasm-plugin@v0
        with:
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ncipollo/release-action@v1
        with:
          artifacts: builds/*
          artifactErrorsFailBuild: true
          body: ${{ steps.build.outputs.changelog-entry }}
          # A single-plugin repo: the newest release must be `latest` so the
          # bare `github://Dangercoder/moon-clojure-toolchain` locator resolves.
          makeLatest: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          skipIfReleaseExists: true
